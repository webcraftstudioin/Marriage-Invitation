<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wedding Invite</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>




body {
  height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a1a1a, #000);
  font-family: 'Poppins', sans-serif;
  color: white;
}

.container-box {
  text-align: center;
  background: #111;
  padding: 40px;
  border-radius: 15px;
  border: 1px solid rgba(212,175,55,0.3);
  box-shadow: 0 0 20px rgba(212,175,55,0.2);
}
</style>
</head>

<body>

<div class="container-box">
  <h2>💍 With joyful hearts, we invite you to celebrate the wedding of
<b>Vishwa & Rashmi</b>

<br>
and
<br>
<b>Harsha & Hamsika</b>
<br>
as they begin their beautiful journey together.</h2>
  <!-- <p>Please enter your name</p> -->

  <input type="text" id="name" class="form-control mb-3" placeholder="Enter Your Name">

  <button class="btn btn-dark w-100" onclick="goNext(event)">View Invitation</button>

<script>
function goNext(e) {
  let name = document.getElementById("name").value;

  if (name.trim() === "") {
    alert("Please enter your name");
    return;
  }

  /* FORCE USER INTERACTION BEFORE NAVIGATION */
  const audio = new Audio("dhurander.mp3");
  audio.play().then(() => {
    audio.pause();
    window.location.href = "invitation.html?name=" + encodeURIComponent(name);
  }).catch(() => {
    window.location.href = "invitation.html?name=" + encodeURIComponent(name);
  });
}
</script>

</body>
</html>
