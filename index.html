<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wedding Invite</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>




body {
  height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  font-family: 'Segoe UI';
}
.container-box {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container-box">
  <h2>💍 With joyful hearts, we invite you to celebrate the wedding of
<b>Vishwa & Rashmi</b>

<br>
and
<br>
<b>Harsha & Hamsika</b>
<br>
as they begin their beautiful journey together.</h2>
  <p>Please enter your name</p>

  <input type="text" id="name" class="form-control mb-3" placeholder="Your Name">

  <button class="btn btn-dark w-100" onclick="goNext()">View Invitation</button>
</div>

<script>
function goNext() {
  let name = document.getElementById("name").value;

  if (name.trim() === "") {
    alert("Please enter your name");
    return;
  }

  window.location.href = "invitation.html?name=" + encodeURIComponent(name);
}
</script>

</body>
</html>
